{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Login - Diário de Treino</title>
    <link rel="stylesheet" href="{% static 'home/css/style.css' %}">
</head>
<body>

    <div class="login-container">
        <h1 class="titulo-login">Acesse seu Treino</h1>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="input-group">
                <label for="id_username">Usuário:</label>
                <input type="text" name="username" id="id_username" required autofocus>
            </div>
            
            <div class="input-group">
                <label for="id_password">Senha:</label>
                <input type="password" name="password" id="id_password" required>
            </div>
            
            {% if form.errors %}
                <p class="erro-login">Usuário ou senha inválidos. Tente novamente.</p>
            {% endif %}
            
            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <div class="cadastro-link">
            <p>Ainda não tem conta?</p>
            <a href="{% url 'cadastro_usuario' %}" class="btn-cadastrar">Cadastrar-se</a>
        </div>
    </div>

</body>
</html>

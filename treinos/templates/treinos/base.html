{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Diário de Treino</title>
    <link rel="stylesheet" href="{% static 'treinos/css/style.css' %}">
    <style>
        /* Estilos do Menu de Navegação */
        .navbar {
            background-color: var(--card-bg);
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 30px;
            width: 100%;
            box-sizing: border-box;
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1000;
        }
        .navbar-brand { font-size: 1.5rem; font-weight: bold; color: var(--primary-color); text-decoration: none; }
        .nav-links { display: flex; align-items: center; gap: 20px; }
        .nav-link { color: var(--text-light); text-decoration: none; font-weight: 500; transition: color 0.3s; }
        .nav-link:hover { color: var(--primary-color); }
        .user-greeting { color: #aaa; font-size: 0.9rem; margin-right: 15px; }
        
        /* Botão de Logout via Formulário */
        .logout-form { margin: 0; }
        .btn-logout { background: none; border: none; color: #ff4444; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-logout:hover { text-decoration: underline; }
        
        /* Ajuste do corpo para não sumir atrás do menu fixo */
        body { padding-top: 80px; flex-direction: column; justify-content: flex-start; }
        .conteudo-principal { width: 100%; display: flex; justify-content: center; padding: 20px; box-sizing: border-box; }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="{% url 'dashboard' %}" class="navbar-brand">Diário de Treino</a>
        
        <div class="nav-links">
            <a href="{% url 'dashboard' %}" class="nav-link">Meus Treinos</a>
            <a href="{% url 'novo_treino' %}" class="nav-link">Novo Treino</a>
            
            <span class="user-greeting">Olá, {{ request.user.username }}</span>
            
            <form method="POST" action="{% url 'logout' %}" class="logout-form">
                {% csrf_token %}
                <button type="submit" class="btn-logout">Sair</button>
            </form>
        </div>
    </nav>

    <main class="conteudo-principal">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
